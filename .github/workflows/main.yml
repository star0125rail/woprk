name: WOP 排行榜自動爬蟲

on:
  schedule:
    - cron: '0 20 * * *' 
  workflow_dispatch: 

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    
    # 權限設定 (確保能存入 TSV)
    permissions:
      contents: write

    # === 新增：強制使用最新的 Node.js 24 環境，消除系統警告 ===
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安裝相依套件
        run: pip install httpx tqdm

      - name: 執行爬蟲腳本
        run: python woprk_plus.py

      - name: 提交更新後的 data.js 與 TSV 檔案到 GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.js *.tsv
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: 排行榜資料更新"
          git push

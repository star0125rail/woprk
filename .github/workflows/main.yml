name: WOP 排行榜自動爬蟲

# 設定觸發條件
on:
  schedule:
    # 每天台灣時間凌晨 4 點自動執行 (cron 使用 UTC 時間，台灣時間減 8 小時)
    - cron: '0 20 * * *' 
  workflow_dispatch: # 這個設定會讓你在 GitHub 介面上多出一個「手動執行」的按鈕

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安裝相依套件
        run: pip install httpx tqdm

      - name: 執行爬蟲腳本
        run: python woprk_plus.py

      - name: 提交更新後的 data.js 與 TSV 檔案到 GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.js *.tsv
          # 如果沒有檔案變動就不 commit，避免報錯
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: 排行榜資料更新"
          git push

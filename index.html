<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波拉西亞戰記 - 戰力排行榜</title>
    <style>
        body {
            background-color: #1a1b26;
            color: #c0caf5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h2 { text-align: center; color: #ffffff; letter-spacing: 2px; }
        .controls-container { max-width: 1200px; margin: 0 auto 15px auto; display: flex; justify-content: flex-end; }
        #searchInput {
            padding: 10px 15px; border-radius: 20px; border: 1px solid #414868;
            background-color: #24283b; color: #c0caf5; width: 250px; outline: none;
        }
        table {
            width: 100%; max-width: 1200px; margin: 0 auto; border-collapse: collapse;
            background-color: #24283b; border-radius: 8px; overflow: hidden;
        }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #1f2335; font-size: 14px; }
        th { background-color: #1f2335; color: #7aa2f7; font-weight: bold; }
        tr:hover { background-color: #2f334d; }
        .rank-badge {
            display: inline-block; width: 26px; height: 26px; line-height: 26px;
            text-align: center; border-radius: 50%; background-color: #414868;
            color: #fff; font-weight: bold; font-size: 12px;
        }
        .rank-1 { background-color: #ffc72c; color: #000; }
        .rank-2 { background-color: #c0c0c0; color: #000; }
        .rank-3 { background-color: #cd7f32; color: #fff; }
        .server-tag { background-color: #0db9d7; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .class-name { color: #bb9af7; }
        .player-name { color: #ffffff; font-weight: bold; }
        .exp-text { color: #9ece6a; }
        .grade-text { color: #e0af68; font-weight: bold; }
        .gain-text { color: #7dcfff; font-weight: bold; }
        /* 每小時經驗的顏色樣式 */
        .hourly-text { color: #f7768e; font-size: 0.9em; }

        .pagination { max-width: 1200px; margin: 20px auto; display: flex; justify-content: center; gap: 8px; }
        .page-btn { background-color: #24283b; color: #c0caf5; border: 1px solid #414868; padding: 6px 10px; border-radius: 5px; cursor: pointer; }
        .page-btn.active { background-color: #7aa2f7; color: #1a1b26; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🏆 波拉西亞戰記排行榜</h2>

    <div class="controls-container">
        <input type="text" id="searchInput" placeholder="🔍 搜尋玩家、公會、伺服器...">
    </div>

    <table>
        <thead>
            <tr>
                <th>排名</th>
                <th>角色名稱</th>
                <th>公會</th>
                <th>職業</th>
                <th>討伐</th>
                <th>等級</th>
                <th>經驗值</th>
                <th>每小時經驗</th> <th>24H 預估</th>
                <th>伺服器</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>

    <div id="pagination" class="pagination"></div>

    <script src="data.js"></script>

    <script>
        function formatExperience(expValue) {
            const num = Number(expValue);
            if (isNaN(num)) return expValue; 
            if (num >= 1000000000000) {
                return `${Math.floor(num / 1000000000000)}兆${((num % 1000000000000) / 100000000).toFixed(2)}億`;
            } else if (num >= 100000000) {
                return `${(num / 100000000).toFixed(2)}億`;
            } else if (num >= 10000) {
                return `${(num / 10000).toFixed(2)}萬`;
            }
            return num.toString();
        }

        woprkData.sort((a, b) => Number(b.gc_exp) - Number(a.gc_exp));
        woprkData.forEach((player, index) => { player.global_rank = index + 1; });

        const top300Data = woprkData.slice(0, 300);
        let currentPage = 1;
        const rowsPerPage = 50;
        let currentDisplayData = [...top300Data];

        function renderTable() {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            const startIndex = (currentPage - 1) * rowsPerPage;
            const pageData = currentDisplayData.slice(startIndex, startIndex + rowsPerPage);

            pageData.forEach(player => {
                const tr = document.createElement('tr');
                let rankClass = player.global_rank <= 3 ? `rank-${player.global_rank}` : '';
                
                // 處理增量顯示
                let hourlyHtml = player.hourly_gain > 0 ? `+${formatExperience(player.hourly_gain)}` : '-';
                let dailyHtml = player.exp_gain > 0 ? `+${formatExperience(player.exp_gain)}` : '-';

                tr.innerHTML = `
                    <td><span class="rank-badge ${rankClass}">${player.global_rank}</span></td>
                    <td class="player-name">${player.gc_name}</td>
                    <td>${player.guild_name || '-'}</td>
                    <td class="class-name">${player.class_name}</td>
                    <td class="grade-text">${player.grade || '-'}</td>
                    <td>${player.gc_level}</td>
                    <td class="exp-text">${formatExperience(player.gc_exp)}</td>
                    <td class="hourly-text">${hourlyHtml}</td> <td class="gain-text">${dailyHtml}</td>
                    <td><span class="server-tag">${player.world_name}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            const totalPages = Math.ceil(currentDisplayData.length / rowsPerPage);
            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; updateView(); };
                container.appendChild(btn);
            }
        }

        function updateView() { renderTable(); renderPagination(); }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            currentDisplayData = top300Data.filter(p => 
                p.gc_name.toLowerCase().includes(term) || 
                (p.guild_name && p.guild_name.toLowerCase().includes(term)) ||
                p.world_name.toLowerCase().includes(term)
            );
            currentPage = 1;
            updateView();
        });

        updateView();
    </script>
</body>
</html>
